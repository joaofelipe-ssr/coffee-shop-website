<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ponto do Café</title>

    <!-- Link de ícones -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- Meus Links de Estilo -->
    <link rel="stylesheet" href="./styles/login.css">
</head>

<body>
    <main class="container">
        <a href="#" class="logo">
                <img src="./images/logo.png" alt="Logo da Cafeteria">
        </a>
        <form>
            <h1>PONTO DO CAFÉ</h1>
            <h3>O MELHOR CAFÉ DA REGIÃO</h3>

            <div class="icons">
                <img width="80" src="https://img.icons8.com/ios/50/d3ad7f/horizontal-line.png" alt="horizontal-line"/>
                <img width="23" height="23" src="https://img.icons8.com/ios-glyphs/30/d3ad7f/coffee-beans-.png" alt="coffee-beans-"/>
                <img width="80" src="https://img.icons8.com/ios/50/d3ad7f/horizontal-line.png" alt="horizontal-line"/>
            </div>

            <h4>Faça Login para continuar</h4>

            <div class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueci a senha</a>
            </div>

            <button type="submit" class="login">Login</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="#">Cadastre-se<a></p>
            </div>
        </form>
    </main>
</body>
</html>
